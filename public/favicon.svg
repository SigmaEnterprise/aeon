<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer glow circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" />
  <!-- Six-pointed star (Star of Aeon) -->
  <polygon points="32,6 37.5,22.5 55,22.5 41,33 46.5,49.5 32,39 17.5,49.5 23,33 9,22.5 26.5,22.5" fill="url(#star)" filter="url(#glow)" />
  <!-- Inner sparkle dot -->
  <circle cx="32" cy="32" r="4" fill="white" opacity="0.9"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="star" x1="9" y1="6" x2="55" y2="49.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
